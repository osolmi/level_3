<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>폼태그2. 선택, 목록기능</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/form02.css">
    <script src="form02.js"></script>
</head>
<body>
    <form action="#" method="post" id="frm1" name="frm1"><!-- form:post#frm1 -->
        <p><input type="search" placeholder="검색어" name="user_search_txt" id="user_search_txt"></p>
        <p><input type="text" value="1" id="number"></p>
        <p><input type="password" placeholder="비밀번호를 입력하세요" name="" id=""></p>
        <p><textarea rows="10" cols="40" name="user_review" id="user_review"></textarea></p>
        <p><textarea cols="30" disabled name="close_comment" id="close_comment">현재는 문의시간이 아닙니다.</textarea></p>
        <p><textarea maxlength="100" minlength="10" placeholder="10자 이상 100자 이하로 입력해주세요." cols="50" rows="5" name="user_review" id="user_review"></textarea></p>
        <p><button type="button" id="review_btn">리뷰등록</button></p>
        <hr>
        <div class="group1">
            <span>성별을 선택해주세요.</span>
            <label for="male">남자</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">여</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="gender_none">공개안함</label>
            <input type="radio" name="gender" id="gender_none" value="gender_none">
            <!-- input 입력양식/선택양식 -->
            <!-- 입력양식 name(데이터구분목적), value(기본값)속성 -->
            <!-- 선택양식 name(2개 이상의 선택을 묶어주는 동일그룹명), value(데이터구분목적)속성 -->
            <span>광고 수신 동의</span>
            동의함<input type="radio" name="ad_yn" id="ad_y" value="ad_y">
            동의안함<input type="radio" name="ad_yn" id="ad_n" value="ad_n">
            <span>로그인상태유지</span>
            <input type="checkbox" name="login_state_y" id="login_state_y" value="login_state_y">
            <span>관심 종목을 2개 이상 선택하세요</span>
            <label for="interest_it">기술/IT</label>
            <input type="checkbox" name="interest_g" id="interest_it" value="interest_it">
            <label for="interest_sports">스포츠</label>
            <input type="checkbox" name="interest_g" id="interest_sports" value="interest_sports">
            <label for="interest_mu_mov">음악/영화</label>
            <input type="checkbox" name="interest_g" id="interest_mu_mov" value="interest_mu_mov">
            <span>주문색상</span>
            <select name="color_select" id="color_select">
                <option value="none">색상을 선택하세요</option>
                <option value="white">white</option>
                <option value="gray">gray</option>
                <option value="black">black</option>
            </select>
            <span>주문크기</span>
            <select name="size" id="size">
                <option value="none_size">사이즈를 선택하세요</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>
    </form>
</body>
</html>
