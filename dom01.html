<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>Document</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/dom01.css">
    <script src="./scripts/dom01.js" defer></script>
    <!-- script의 defer 속성 : body 태그를 모두 읽고 script 나중에 처리하라는 속성 -->
</head>
<body>
    <div id="wrap">
        <header>
            <div class="top">
                <h1><a href="#">To Do</a></h1>
                <div class="right">
                    <a href="#" class="search"><img src="" alt="검색"></a>
                    <a href="#" class="menu"><img src="" alt="메뉴"></a>
                </div>
            </div>
            <nav>
                <a href="#" class="active all">All(3)</a>
                <a href="#" class="today">Today(0)</a>
            </nav>
        </header>
        <main>
            <ul class="todo_list">
                <li><span>07.07</span><em class="list">책 15분 읽기</em></li>
                <li><span>07.07</span><em class="list">과제하기</em></li>
                <li><span>07.08</span><em class="list">영단어외우기</em></li>
                <li><span>07.08</span><em class="list">숨쉬기</em></li>
            </ul>
            <button id="write_btn" onclick="popupShow()"><img src="#" alt="글쓰기창띄우기"></button>
            <div id="popup">
                <input class="user_write" type="text" placeholder="add a new task">
                <button class="enroll_btn"><img src="" alt="할일등록버튼"></button>
            </div>
            <div id="popup_bg" onclick="popupHide()"></div>
        </main>
    </div>
</body>
</html>
